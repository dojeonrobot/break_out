server {
    listen 80;
    server_name breakout.doroedu.co.kr 210.109.15.216;

    root /home/ubuntu/breakout;
    index index.html;

    # HTML: 절대 캐시 안 함 - 항상 서버에서 새로 받음
    location / {
        try_files $uri $uri/ $uri/index.html =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # CSS/JS: 쿼리스트링 바뀌면 새로 받음
    location ~* \.(css|js)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # 이미지/오디오: 쿼리스트링 바뀌면 새로 받음
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|mp3|m4a|mp4|pdf)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ~ /\. {
        deny all;
    }

    gzip on;
    gzip_types text/css application/javascript image/svg+xml;
    gzip_min_length 1000;
}
