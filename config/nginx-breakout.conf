server {
    listen 80;
    server_name breakout.dorobus.com;

    root /home/ubuntu/breakout;
    index index.html;

    # ============================================
    # CACHE CONTROL
    # ============================================

    # HTML - 항상 최신 버전 (캐시 안 함)
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # CSS/JS - 중기 캐시 (1일)
    location ~* \.(css|js)$ {
        add_header Cache-Control "public, max-age=86400";
    }

    # 이미지/오디오 - 장기 캐시 (1주)
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|mp3|m4a|mp4|pdf)$ {
        add_header Cache-Control "public, max-age=604800";
    }

    # ============================================
    # GZIP 압축 (nginx.conf에 없을 경우)
    # ============================================
    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml;
    gzip_min_length 1000;

    # ============================================
    # ROUTING
    # ============================================

    # 메인 + 챕터 라우팅
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # 보안: 숨김 파일 접근 차단
    location ~ /\. {
        deny all;
        return 404;
    }
}
